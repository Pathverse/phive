name: phive_test
description: "Integration test package for validating PHive generator and runtime behavior."
version: 0.0.1
homepage: https://github.com/Pathverse/phive
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: "^3.0.0"

dependencies:
  flutter:
    sdk: flutter
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.0.2
  phive: ^0.1.0
  phive_barrel: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  phive_generator: ^0.1.0

dependency_overrides:
  phive:
    path: ../phive
  phive_barrel:
    path: ../phive_barrel
  phive_generator:
    path: ../phive_generator
