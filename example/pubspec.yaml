name: example
description: "Flutter demo app for PHive cache save/restore with hook behavior."
publish_to: 'none'
version: 0.1.0+1
homepage: https://github.com/Pathverse/phive

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  freezed_annotation: ^3.1.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  phive:
    path: ../phive
  phive_barrel:
    path: ../phive_barrel

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  phive_generator:
    path: ../phive_generator
  freezed: ^3.2.5

flutter:
  uses-material-design: true
